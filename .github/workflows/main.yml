name: W11 Daily Tutor

on:
  schedule:
    - cron: "0 5 * * *"   # Täglich 06:00 Uhr Schweizer Zeit
  workflow_dispatch:        # Auch manuell startbar

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Pakete installieren
        run: |
          npm install docx
          pip install anthropic

      - name: Anleitungen generieren
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 - <<'PYEOF'
          import anthropic, json, re
          from datetime import date
          from pathlib import Path

          WEEKLY = {
            0: ("W11 Basics",  "OneDrive"),
            1: ("Office 365",  "Teams"),
            2: ("W11 Basics",  "Edge"),
            3: ("Teams",       "OneDrive"),
            4: ("Office 365",  "W11 Basics"),
            5: ("Edge",        "Teams"),
            6: ("W11 Basics",  "OneDrive"),
          }

          today = date.today()
          datum = today.strftime("%d.%m.%Y")
          cat1, cat2 = WEEKLY[today.weekday()]
          print(f"Generiere Anleitungen fuer {datum}: {cat1} + {cat2}")

          client = anthropic.Anthropic()
          resp = client.messages.create(
            model="claude-haiku-4-5-20251001",
            max_tokens=3000,
            messages=[{"role": "user", "content": f"""Erstelle 2 Windows 11 Anleitungen auf Deutsch fuer {datum}.
          Anleitung 1: Kategorie {cat1}. Anleitung 2: Kategorie {cat2}.
          Antworte NUR mit diesem JSON (keine Backticks):
          {{
            "anleitungen": [
              {{
                "nr": 1,
                "titel": "Kurzer Titel max 5 Woerter",
                "warum": "1 Satz Nutzen fuer Lehrer oder Schueler",
                "kategorie": "{cat1}",
                "dauer": "5 Min",
                "schritte": [
                  {{"nr": 1, "aktion": "Imperativ-Satz", "erklaerung": "Kurze Erklaerung"}},
                  {{"nr": 2, "aktion": "Imperativ-Satz", "erklaerung": "Kurze Erklaerung"}},
                  {{"nr": 3, "aktion": "Imperativ-Satz", "erklaerung": "Kurze Erklaerung"}}
                ],
                "illust_prompt": "Detailed English prompt for Gemini: flat-design cartoon school style, turquoise #06F4A1 and jonquil #F0FC9C, no text in image",
                "quicktip": "Tastenkuerzel oder schnellster Weg",
                "w11_integration": "Wie dieses Feature mit Windows 11 zusammenspielt",
                "faq_frage": "Typische Anfaenger-Frage",
                "faq_antwort": "Kurze klare Antwort",
                "unterricht": "Konkrete Schueleraufgabe in 3 Schritten"
              }},
              {{
                "nr": 2,
                "titel": "Kurzer Titel max 5 Woerter",
                "warum": "1 Satz Nutzen fuer Lehrer oder Schueler",
                "kategorie": "{cat2}",
                "dauer": "5 Min",
                "schritte": [
                  {{"nr": 1, "aktion": "Imperativ-Satz", "erklaerung": "Kurze Erklaerung"}},
                  {{"nr": 2, "aktion": "Imperativ-Satz", "erklaerung": "Kurze Erklaerung"}},
                  {{"nr": 3, "aktion": "Imperativ-Satz", "erklaerung": "Kurze Erklaerung"}}
                ],
                "illust_prompt": "Detailed English prompt for Gemini: flat-design cartoon school style, turquoise #06F4A1 and jonquil #F0FC9C, no text in image",
                "quicktip": "Tastenkuerzel oder schnellster Weg",
                "w11_integration": "Wie dieses Feature mit Windows 11 zusammenspielt",
                "faq_frage": "Typische Anfaenger-Frage",
                "faq_antwort": "Kurze klare Antwort",
                "unterricht": "Konkrete Schueleraufgabe in 3 Schritten"
              }}
            ]
          }}"""}]
          )

          raw = resp.content[0].text.strip()
          raw = re.sub(r"^```[a-z]*\s*", "", raw)
          raw = re.sub(r"\s*```$", "", raw)
          data = json.loads(raw)

          Path("output_data").mkdir(exist_ok=True)
          with open("output_data/today.json", "w", encoding="utf-8") as f:
              json.dump({"datum": datum, "anleitungen": data["anleitungen"]}, f, ensure_ascii=False, indent=2)
          print(f"✅ JSON gespeichert: {len(data['anleitungen'])} Anleitungen")
          PYEOF

      - name: Word-Dokumente erstellen
        run: |
          node - <<'JSEOF'
          const { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell,
                  AlignmentType, BorderStyle, WidthType, ShadingType, LevelFormat } = require('./node_modules/docx');
          const fs = require('fs');

          const data  = JSON.parse(fs.readFileSync('output_data/today.json', 'utf8'));
          const datum = data.datum;
          const FONT  = "Aptos";
          const TG    = "06F4A1";
          const BLACK = "000000";
          const GREY  = "444444";
          const LGREY = "888888";
          const JQ    = "F0FC9C";
          const CW    = 9360;

          const t = (text, opts={}) => new TextRun({ text, font: FONT, ...opts });
          const p = (runs, opts={}) => new Paragraph({
            children: Array.isArray(runs) ? runs : [runs],
            spacing: { before: 0, after: 120 }, ...opts
          });
          const sp = (after=160) => new Paragraph({ children:[t("")], spacing:{before:0,after} });
          const hr = () => new Paragraph({
            children: [],
            border: { bottom: { style: BorderStyle.SINGLE, size:8, color:TG, space:1 } },
            spacing: { before:160, after:160 }
          });

          const oneColTable = (cellEl) => new Table({
            width:{size:CW,type:WidthType.DXA}, columnWidths:[CW],
            rows:[new TableRow({children:[cellEl]})]
          });

          const leftBarCell = (children, fill) => new TableCell({
            width:{size:CW,type:WidthType.DXA},
            shading:{fill,type:ShadingType.CLEAR},
            margins:{top:120,bottom:120,left:200,right:180},
            borders:{
              top:{style:BorderStyle.NONE}, bottom:{style:BorderStyle.NONE},
              left:{style:BorderStyle.THICK,size:20,color:TG},
              right:{style:BorderStyle.NONE}
            }, children
          });

          const outlineCell = (children, fill) => new TableCell({
            width:{size:CW,type:WidthType.DXA},
            shading:{fill,type:ShadingType.CLEAR},
            margins:{top:120,bottom:120,left:180,right:180},
            borders:{
              top:{style:BorderStyle.SINGLE,size:8,color:TG},
              bottom:{style:BorderStyle.SINGLE,size:8,color:TG},
              left:{style:BorderStyle.SINGLE,size:8,color:TG},
              right:{style:BorderStyle.SINGLE,size:8,color:TG}
            }, children
          });

          const dashCell = (children) => new TableCell({
            width:{size:CW,type:WidthType.DXA},
            shading:{fill:JQ,type:ShadingType.CLEAR},
            margins:{top:120,bottom:120,left:180,right:180},
            borders:{
              top:{style:BorderStyle.DASH_SMALL_GAP,size:6,color:"AAAAAA"},
              bottom:{style:BorderStyle.DASH_SMALL_GAP,size:6,color:"AAAAAA"},
              left:{style:BorderStyle.DASH_SMALL_GAP,size:6,color:"AAAAAA"},
              right:{style:BorderStyle.DASH_SMALL_GAP,size:6,color:"AAAAAA"}
            }, children
          });

          const banner = (nr, titel, subtitle) => new Table({
            width:{size:CW,type:WidthType.DXA}, columnWidths:[CW],
            rows:[new TableRow({children:[new TableCell({
              width:{size:CW,type:WidthType.DXA},
              shading:{fill:"FFFFFF",type:ShadingType.CLEAR},
              margins:{top:160,bottom:160,left:220,right:220},
              borders:{
                top:{style:BorderStyle.SINGLE,size:10,color:TG},
                bottom:{style:BorderStyle.SINGLE,size:10,color:TG},
                left:{style:BorderStyle.THICK,size:36,color:TG},
                right:{style:BorderStyle.SINGLE,size:10,color:TG}
              },
              children:[
                p(t(`ANLEITUNG ${nr}`,{size:18,bold:true,color:LGREY}),{spacing:{before:0,after:60}}),
                p(t(titel,{size:40,bold:true,color:TG}),{spacing:{before:0,after:80}}),
                p(t(subtitle,{size:20,italics:true,color:LGREY}),{spacing:{before:0,after:0}}),
              ]
            })]})]
          });

          const whyBox = (text) => oneColTable(leftBarCell([
            p([t("Warum wichtig?   ",{size:22,bold:true,color:BLACK}),
               t(text,{size:22,color:GREY})], {spacing:{before:0,after:0}})
          ], JQ));

          const stepHead = (text) =>
            p(t(text,{size:28,bold:true,color:TG}),{spacing:{before:200,after:80}});

          const illustBox = (prompt) => oneColTable(outlineCell([
            p([t("ILLUSTRATION  -  ",{size:21,bold:true,color:TG}),
               t("Prompt fuer Gemini / Bild-KI:",{size:20,bold:true,color:GREY})],
              {spacing:{before:0,after:80}}),
            p(t(prompt,{size:20,color:BLACK}),{spacing:{before:0,after:0}})
          ], "EDFFF8"));

          const ssBox = (desc, fname) => oneColTable(dashCell([
            p(t("PLATZHALTER: Echter Screenshot",{size:21,bold:true,color:BLACK}),
              {alignment:AlignmentType.CENTER,spacing:{before:0,after:80}}),
            p([t("Beschreibung: ",{size:20,bold:true,color:GREY}),
               t(desc,{size:20,color:GREY})], {spacing:{before:0,after:40}}),
            p([t("Dateiname: ",{size:18,bold:true,color:LGREY}),
               t(fname,{size:18,italics:true,color:LGREY})], {spacing:{before:0,after:0}})
          ]));

          const infoBox = (label, lines) => oneColTable(leftBarCell([
            p(t(label,{size:22,bold:true,color:BLACK}),{spacing:{before:0,after:80}}),
            ...lines.map(l => p(t(l,{size:21,color:GREY}),{spacing:{before:0,after:60}}))
          ], JQ));

          const footerBar = (tag) => oneColTable(new TableCell({
            width:{size:CW,type:WidthType.DXA},
            shading:{fill:"F5F5F5",type:ShadingType.CLEAR},
            margins:{top:120,bottom:120,left:180,right:180},
            borders:{
              top:{style:BorderStyle.NONE},bottom:{style:BorderStyle.NONE},
              left:{style:BorderStyle.NONE},right:{style:BorderStyle.NONE}
            },
            children:[p([
              t("W11 Daily Tutor  |  ",{size:18,color:LGREY}),
              t(tag,{size:18,bold:true,color:TG}),
              t("  |  Fuer Schueler und Lehrer",{size:18,color:LGREY})
            ],{alignment:AlignmentType.CENTER,spacing:{before:0,after:0}})]
          }));

          const numbering = { config: [
            { reference:"numlist", levels:[{ level:0, format:LevelFormat.DECIMAL, text:"%1.",
                alignment:AlignmentType.LEFT,
                style:{paragraph:{indent:{left:600,hanging:360}},
                       run:{font:FONT,bold:true,color:TG}}}]},
            { reference:"bullist", levels:[{ level:0, format:LevelFormat.BULLET, text:"*",
                alignment:AlignmentType.LEFT,
                style:{paragraph:{indent:{left:600,hanging:360}},
                       run:{font:FONT}}}]}
          ]};

          const styles = { default:{ document:{ run:{ font:FONT, size:22, color:BLACK }}}};
          const pageProps = { properties:{ page:{
            size:{width:11906,height:16838},
            margin:{top:1080,right:1080,bottom:1080,left:1080}
          }}};

          const numList = (items) => items.map(text =>
            new Paragraph({ numbering:{reference:"numlist",level:0},
              children:[t(text,{size:22,color:BLACK})], spacing:{before:0,after:80} })
          );

          function buildChildren(a) {
            const kids = [];
            kids.push(banner(a.nr, a.titel, `${datum}  |  ${a.kategorie}  |  ${a.dauer}`));
            kids.push(sp(100));
            kids.push(whyBox(a.warum));
            kids.push(sp(60));
            kids.push(hr());
            for (const s of a.schritte) {
              kids.push(stepHead(`SCHRITT ${s.nr}: ${s.aktion}`));
              kids.push(p(t(s.erklaerung,{size:22,color:GREY}),{spacing:{before:0,after:80}}));
              kids.push(illustBox(a.illust_prompt));
              kids.push(sp(80));
              kids.push(ssBox(
                `Screenshot fuer Schritt ${s.nr}: ${s.aktion}`,
                `screenshot_anleitung${a.nr}_schritt${s.nr}.png`
              ));
              kids.push(sp(80));
            }
            kids.push(hr());
            kids.push(infoBox("QUICK TIP:", [a.quicktip]));
            kids.push(sp(80));
            kids.push(infoBox("W11-INTEGRATION:", [a.w11_integration]));
            kids.push(sp(80));
            kids.push(infoBox("HAEUFIGE FRAGEN:", [
              `F: ${a.faq_frage}`,
              `A: ${a.faq_antwort}`
            ]));
            kids.push(sp(80));
            kids.push(infoBox("FUER DEN UNTERRICHT:", [a.unterricht]));
            kids.push(sp(120));
            kids.push(footerBar(`${a.kategorie}  |  ${datum}`));
            return kids;
          }

          const outDir = `output/${datum.replace(/\./g,"-")}`;
          fs.mkdirSync(outDir, {recursive:true});

          (async () => {
            for (const a of data.anleitungen) {
              const doc = new Document({
                numbering, styles,
                sections:[{...pageProps, children:buildChildren(a)}]
              });
              const buf = await Packer.toBuffer(doc);
              const safe = a.titel.replace(/[^\w]/g,"_").substring(0,40);
              const fname = `${outDir}/W11_${datum}_Anleitung${a.nr}_${safe}.docx`;
              fs.writeFileSync(fname, buf);
              console.log(`OK: ${fname}  (${Math.round(buf.length/1024)} KB)`);
            }
          })().catch(e => { console.error("FEHLER:", e.message); process.exit(1); });
          JSEOF

      - name: Dateien in GitHub speichern
        run: |
          git config user.name "W11 Daily Tutor Bot"
          git config user.email "bot@w11-tutor.local"
          git pull --rebase origin main
          git add output/
          git diff --cached --quiet || git commit -m "W11 Anleitungen $(date +'%d.%m.%Y')"
          git push
